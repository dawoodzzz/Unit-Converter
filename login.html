<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to Unit Converter - Access your account and history">
    <title>Login | Unit Converter</title>
    <link rel="stylesheet" href="index.css">
    <style>
        .login-page-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 70px);
            padding: 40px 20px;
        }

        .login-wrapper {
            width: 100%;
            max-width: 450px;
        }

        .login-card {
            background: linear-gradient(135deg, rgba(20, 30, 60, 0.98), rgba(15, 52, 96, 0.98));
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #64c8ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-field label {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .form-field input {
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(100, 200, 255, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .form-field input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-field input:focus {
            background: rgba(100, 200, 255, 0.15);
            border-color: #64c8ff;
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.3);
            outline: none;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.8);
        }

        .remember-me input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .forgot-password {
            color: #64c8ff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-align: right;
        }

        .forgot-password:hover {
            color: #a78bfa;
        }

        .login-btn {
            padding: 16px;
            background: linear-gradient(135deg, rgba(100, 200, 255, 0.4), rgba(167, 139, 250, 0.3));
            border: 2px solid rgba(100, 200, 255, 0.6);
            color: white;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, rgba(100, 200, 255, 0.6), rgba(167, 139, 250, 0.5));
            border-color: #64c8ff;
            box-shadow: 0 10px 30px rgba(100, 200, 255, 0.4);
            transform: translateY(-2px);
        }

        .login-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(100, 200, 255, 0.2);
        }

        .login-footer p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
        }

        .signup-link {
            color: #64c8ff;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .signup-link:hover {
            color: #a78bfa;
        }

        .features-list {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(100, 200, 255, 0.2);
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .feature-icon {
            color: #4ade80;
            font-size: 1.3rem;
        }

        @media (max-width: 600px) {
            .login-card {
                padding: 35px 25px;
            }

            .login-header h1 {
                font-size: 2rem;
            }

            .login-form {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <span class="logo-icon">⚙️</span>
                <span class="logo-text">Unit Converter</span>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="about.html" class="nav-link">About</a>
                </li>
                <li class="nav-item">
                    <a href="help.html" class="nav-link">Help</a>
                </li>
            </ul>

            <div class="nav-auth">
                <button class="btn-login" style="pointer-events: none; opacity: 0.7;">Login</button>
                <a href="signup.html" class="btn-signup" style="text-decoration: none; display: flex; align-items: center; padding: 10px 24px;">Sign Up</a>
            </div>

            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <div class="login-page-container">
        <div class="login-wrapper">
            <div class="login-card">
                <div class="login-header">
                    <h1>Welcome Back</h1>
                    <p>Login to your account</p>
                </div>

                <form class="login-form" id="loginPageForm" onsubmit="handleLoginPage(event)">
                    <div class="form-field">
                        <label for="emailInput">Email Address</label>
                        <input 
                            type="email" 
                            id="emailInput" 
                            placeholder="Enter your email"
                            required
                        >
                    </div>

                    <div class="form-field">
                        <label for="passwordInput">Password</label>
                        <input 
                            type="password" 
                            id="passwordInput" 
                            placeholder="Enter your password"
                            required
                        >
                    </div>

                    <div class="remember-me">
                        <input type="checkbox" id="rememberCheckbox">
                        <label for="rememberCheckbox" style="margin: 0; text-transform: none;">Remember me</label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>

                    <button type="submit" class="login-btn">Sign In</button>
                </form>

                <div class="login-footer">
                    <p>Don't have an account? <a href="index.html" class="signup-link">Create one here</a></p>
                </div>

                <div class="features-list">
                    <div class="feature-item">
                        <span class="feature-icon">✓</span>
                        <span>Save your conversion history</span>
                    </div>
                    <div class="feature-item">
                        <span class="feature-icon">✓</span>
                        <span>Track your favorite conversions</span>
                    </div>
                    <div class="feature-item">
                        <span class="feature-icon">✓</span>
                        <span>Sync across all devices</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load users from storage
        let users = JSON.parse(localStorage.getItem('users')) || [];

        function handleLoginPage(event) {
            event.preventDefault();
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                window.location.href = 'index.html';
            } else {
                alert('البريد أو كلمة المرور غير صحيحة');
            }
        }

        // Check if already logged in
        const currentUser = localStorage.getItem('currentUser');
        if (currentUser) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
